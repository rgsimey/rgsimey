<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<!--
  arran-map.svg
  ============================================================
  Simon's Arran outline, with class names added so the
  animation in arran-map.css can drive it.

  Open in Affinity Designer to edit shapes. After editing,
  copy the path data back into index.html (inside <svg id="arranMap">).
  The classes must stay so animation continues to work:
    .arran-wash         — stylistic sea wash (preserved shape)
    .arran-outline      — main coastline (thick ink)
    .arran-sketch       — slightly offset sketch overlay
    .holy-isle-outline  — Holy Isle
    .pladda-outline     — Pladda islet
    .raven .raven-1     — first raven glyph
    .raven .raven-2     — second raven glyph
  ============================================================
-->
